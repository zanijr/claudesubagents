version: '3.8'

services:
  agent-dashboard:
    build: ./dashboard
    container_name: agent-dashboard
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:/app/data/dashboard.db
      - NODE_ENV=production
    volumes:
      - dashboard-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/tasks"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dashboard-data:
